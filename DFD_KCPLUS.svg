<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
  <style>
    .entity { fill:#ffffff; stroke:#222222; stroke-width:2px; }
    .process { fill:#f7f7f7; stroke:#222222; stroke-width:2px; rx:14; ry:14; }
    .datastore { fill:#ffffff; stroke:#222222; stroke-width:2px; }
    .label { font-family: "Times New Roman", Times, serif; fill:#111111; font-size:16px; }
    .title { font-family: "Times New Roman", Times, serif; font-size:18px; font-weight:700; }
    .flow { fill:none; stroke:#444444; stroke-width:2px; marker-end:url(#arrow); }
    .small { font-size:14px; }
  </style>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#444444" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="20" y="30" class="title">Level 1 Data Flow Diagram — KC-PLUS</text>

  <!-- External Entities -->
  <rect x="40" y="80" width="180" height="60" class="entity" />
  <text x="130" y="115" text-anchor="middle" class="label">Customer</text>

  <rect x="980" y="80" width="180" height="60" class="entity" />
  <text x="1070" y="115" text-anchor="middle" class="label">Manager</text>

  <rect x="40" y="520" width="180" height="60" class="entity" />
  <text x="130" y="555" text-anchor="middle" class="label">Supplier</text>

  <!-- Processes -->
  <rect x="320" y="70" width="220" height="80" class="process" />
  <text x="430" y="110" text-anchor="middle" class="label">1.0 Record Sale</text>

  <rect x="320" y="260" width="220" height="80" class="process" />
  <text x="430" y="300" text-anchor="middle" class="label">2.0 Receive Stock</text>

  <rect x="320" y="450" width="220" height="80" class="process" />
  <text x="430" y="490" text-anchor="middle" class="label">3.0 Generate Reports</text>

  <!-- Data Stores (as open rectangles) -->
  <g>
    <rect x="700" y="60" width="320" height="80" class="datastore" />
    <text x="860" y="100" text-anchor="middle" class="label">[PRODUCTS_STOCK]</text>
  </g>

  <g>
    <rect x="700" y="230" width="320" height="80" class="datastore" />
    <text x="860" y="270" text-anchor="middle" class="label">[SALES_RECORDS]</text>
  </g>

  <g>
    <rect x="700" y="400" width="320" height="80" class="datastore" />
    <text x="860" y="440" text-anchor="middle" class="label">[DELIVERIES]</text>
  </g>

  <!-- Flows: Customer -> Record Sale -->
  <path d="M220 110 L320 110" class="flow" />
  <text x="270" y="100" class="small label">Purchase details / Payment</text>

  <!-- Record Sale -> SALES_RECORDS -->
  <path d="M540 140 L700 140" class="flow" />
  <text x="620" y="130" class="small label">Sale record</text>

  <!-- Record Sale -> PRODUCTS_STOCK (update) -->
  <path d="M540 110 L700 110" class="flow" />
  <text x="620" y="100" class="small label">Inventory update</text>

  <!-- Supplier -> Receive Stock -->
  <path d="M130 560 L320 560" class="flow" />
  <text x="225" y="550" class="small label">Delivery note / Invoice</text>

  <!-- Receive Stock -> DELIVERIES -->
  <path d="M540 300 L700 300" class="flow" />
  <text x="620" y="290" class="small label">Delivery record</text>

  <!-- Receive Stock -> PRODUCTS_STOCK -->
  <path d="M540 280 L700 280" class="flow" />
  <text x="620" y="270" class="small label">Stock update</text>

  <!-- Manager -> Generate Reports -->
  <path d="M980 110 L540 110" class="flow" />
  <text x="760" y="100" class="small label">Report request</text>

  <!-- Generate Reports -> Manager (report output) -->
  <path d="M1020 490 L1070 490" class="flow" />
  <text x="945" y="520" class="small label">Weekly sales &amp; stock report</text>

  <!-- Generate Reports reads SALES_RECORDS and PRODUCTS_STOCK -->
  <path d="M540 490 L700 460" class="flow" />
  <text x="620" y="470" class="small label">Read sales &amp; stock</text>

  <path d="M850 360 L540 380" class="flow" />
  <text x="700" y="350" class="small label">Read deliveries</text>

  <!-- Minor connector arrows (visual) -->
  <path d="M700 140 L700 230" class="flow" />
  <path d="M700 300 L700 400" class="flow" />
</svg>
